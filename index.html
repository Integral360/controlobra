<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Control de Obra - Integral360</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:#f4f6f9;
}

.header{
background:#0f172a;
color:white;
padding:20px;
}

.header h1{
margin:0;
}

.cards{
display:flex;
gap:15px;
padding:15px;
flex-wrap:wrap;
}

.card{
background:white;
padding:15px;
border-radius:12px;
box-shadow:0 2px 8px rgba(0,0,0,.1);
min-width:180px;
}

.card h2{
margin:0;
font-size:28px;
}

#map{
height:75vh;
margin:15px;
border-radius:12px;
}

</style>
</head>

<body>

<div class="header">
<h1>Centro de Control Remoto de Obra</h1>
<p>Proyecto 6</p>
</div>

<div class="cards">

<div class="card">
<h2 id="totalApoyos">0</h2>
Apoyos
</div>

<div class="card">
<h2 id="totalTerminados">0</h2>
Terminados
</div>

<div class="card">
<h2 id="totalConstruccion">0</h2>
En construcción
</div>

<div class="card">
<h2 id="totalPendientes">0</h2>
Pendientes
</div>

</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([0.8,-77.6],11);

L.tileLayer(
'https://tile.openstreetmap.org/{z}/{x}/{y}.png',
{
maxZoom:19
}
).addTo(map);

function colorEstado(estado){

    switch(estado){

        case "Terminado":
            return "green";

        case "Construccion":
            return "orange";

        case "Energizado":
            return "blue";

        case "Novedad":
            return "red";

        default:
            return "gray";
    }
}

const urlEstados = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQxTVh-mUt0_Qhbl4EEd3HR-kf0Z_1SDzNmrb3pFJtRCHP7KWJr0oGToKi_ARgx5WxkbPHlIlBGjk8r/pub?gid=0&single=true&output=csv";

function convertirCSV(texto) {
    const lineas = texto.trim().split("\n");
    const encabezados = lineas[0].split(",").map(e => e.trim());

    const datos = {};

    for (let i = 1; i < lineas.length; i++) {
        const valores = lineas[i].split(",").map(v => v.trim());

        const fila = {};
        encabezados.forEach((encabezado, index) => {
            fila[encabezado] = valores[index];
        });

        if (fila.codigo) {
            datos[fila.codigo] = fila;
        }
    }

    return datos;
}
    
Promise.all([
    fetch('data/apoyos.json').then(r => r.json()),
    fetch(urlEstados).then(r => r.text())
])
.then(([data, csv]) => {

    const estados = convertirCSV(csv);

    console.log(estados);

    console.log("Apoyos cargados:", data.length);

    const puntos = [];

    let totalTerminados = 0;
    let totalConstruccion = 0;
    let totalPendientes = 0;

    data.forEach(apoyo => {

        const estadoSheet = estados[apoyo.codigo];

        if (estadoSheet && estadoSheet.estado) {
            apoyo.estado = estadoSheet.estado;
        }

        puntos.push([apoyo.lat, apoyo.lon]);

        if(apoyo.estado === "Terminado"){
            totalTerminados++;
        }
        else if(apoyo.estado === "Construccion"){
            totalConstruccion++;
        }
        else{
            totalPendientes++;
        }

        L.circleMarker(
            [apoyo.lat, apoyo.lon],
            {
                radius: 8,
                color: colorEstado(apoyo.estado),
                fillColor: colorEstado(apoyo.estado),
                fillOpacity: 0.9
            }
        )
        .addTo(map)
        .bindPopup(`
            <b>${apoyo.codigo}</b><br>
            Poste: ${apoyo.poste}<br>
            Estructura: ${apoyo.estructura}<br>
            Estado: ${apoyo.estado}
        `);

    });

    document.getElementById("totalApoyos").innerText = data.length;
    document.getElementById("totalTerminados").innerText = totalTerminados;
    document.getElementById("totalConstruccion").innerText = totalConstruccion;
    document.getElementById("totalPendientes").innerText = totalPendientes;

    if (puntos.length > 0) {
        map.fitBounds(puntos, { padding: [40, 40] });
    }

})
.catch(error => console.error(error));

</script>

</body>
</html>
